<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Customer Feedback</h2>

<table>

<tr>
<th>Venue</th>
<th>User</th>
<th>Feedback</th>
<th>Date</th>
</tr>

{% for f in feedbacks %}

<tr>

<td>{{ f.venue.name }}</td>

<td>{{ f.user.username }}</td>

<td>{{ f.message }}</td>

<td>{{ f.created_at }}</td>

</tr>

{% endfor %}

</table>
</body>
</html>
