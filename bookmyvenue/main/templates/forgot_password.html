{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookMyVenue · Forgot Password</title>
    <!-- Google Font & Font Awesome -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="{% static 'forgot_password.css' %}">
</head>
<body>
    <div class="forgot-card">
        <!-- consistent branding -->
        <div class="brand-row">
            <div class="logo-icon">
                <i class="fas fa-map-marker-alt"></i>
            </div>
            <div class="logo-text">BookMy<span>Venue</span></div>
        </div>

        <h1>Reset password</h1>
        <p class="subtitle">Enter your username and email to reset your password</p>

        <!-- Django messages -->
        {% if messages %}
            {% for message in messages %}
                <div class="{% if message.tags == 'error' %}error-banner{% else %}success-banner{% endif %}" style="display: flex;">
                    <i class="fas {% if message.tags == 'error' %}fa-exclamation-circle{% else %}fa-check-circle{% endif %}"></i> {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <!-- FORGOT PASSWORD FORM -->
        <form id="forgotForm" method="post" action="{% url 'forgot_password' %}" novalidate>
            {% csrf_token %}
            <!-- USERNAME ROW -->
            <div class="form-row">
                <label for="username">Username</label>
                <div class="input-wrapper">
                    <input type="text" id="username" name="username" placeholder="Enter username" autocomplete="username" value="{{ username|default:'' }}" required>
                </div>
                <div id="usernameError" class="error-message" style="display: none;"></div>
            </div>

            <!-- EMAIL ROW -->
            <div class="form-row">
                <label for="email">Email</label>
                <div class="input-wrapper">
                    <input type="email" id="email" name="email" placeholder="Enter email" autocomplete="email" value="{{ email|default:'' }}" required>
                </div>
                <div id="emailError" class="error-message" style="display: none;"></div>
            </div>

            <!-- VERIFY BUTTON -->
            <button type="submit" class="verify-btn">
                <span>Verify & Continue</span>
            </button>

            <div class="signin-route">
                Remember your password? <a href="{% url 'login' %}">Sign in</a>
            </div>
        </form>
    </div>

    <script>
(function() {
    "use strict";

    const form = document.getElementById('forgotForm');
    const username = document.getElementById('username');
    const email = document.getElementById('email');
    const usernameError = document.getElementById('usernameError');
    const emailError = document.getElementById('emailError');

    function setError(input, errorDiv, message) {
        input.classList.add('input-error');
        errorDiv.style.display = 'flex';
        errorDiv.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${message}`;
    }

    function clearError(input, errorDiv) {
        input.classList.remove('input-error');
        errorDiv.style.display = 'none';
    }

    function isValidEmail(val) {
        const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        return re.test(val);
    }

    function validateForm() {
        let isValid = true;

        clearError(username, usernameError);
        clearError(email, emailError);

        if (!username.value.trim()) {
            setError(username, usernameError, 'Username is required');
            isValid = false;
        }

        if (!email.value.trim()) {
            setError(email, emailError, 'Email is required');
            isValid = false;
        } else if (!isValidEmail(email.value.trim())) {
            setError(email, emailError, 'Enter a valid email');
            isValid = false;
        }

        return isValid;
    }

    username.addEventListener('input', function() {
        if (username.value.trim().length > 0) {
            clearError(username, usernameError);
        }
    });

    email.addEventListener('input', function() {
        if (isValidEmail(email.value.trim())) {
            clearError(email, emailError);
        }
    });

    form.addEventListener('submit', function(e) {
        e.preventDefault();

        if (validateForm()) {
            form.submit();
        }
    });

    // Auto-hide Django messages after 4.5 seconds
    const djangoMessages = document.querySelectorAll('.success-banner, .error-banner');
    if (djangoMessages.length > 0) {
        djangoMessages.forEach(function(messageDiv) {
            setTimeout(function() {
                messageDiv.style.transition = 'opacity 0.5s ease';
                messageDiv.style.opacity = '0';
                setTimeout(function() {
                    messageDiv.style.display = 'none';
                }, 500);
            }, 4500);
        });
    }
})();
</script>

</body>
</html>
