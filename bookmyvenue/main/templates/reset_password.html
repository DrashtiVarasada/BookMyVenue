{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookMyVenue · Reset Password</title>
    <!-- Google Font & Font Awesome -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="{% static 'reset_password.css' %}">
</head>
<body>
    <div class="reset-card">
        <!-- consistent branding -->
        <div class="brand-row">
            <div class="logo-icon">
                <i class="fas fa-map-marker-alt"></i>
            </div>
            <div class="logo-text">BookMy<span>Venue</span></div>
        </div>

        <h1>Create new password</h1>
        <p class="subtitle">Enter your new password for <strong>{{ username }}</strong></p>

        <!-- Django messages -->
        {% if messages %}
            {% for message in messages %}
                <div class="{% if message.tags == 'error' %}error-banner{% else %}success-banner{% endif %}" style="display: flex;">
                    <i class="fas {% if message.tags == 'error' %}fa-exclamation-circle{% else %}fa-check-circle{% endif %}"></i> {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <!-- RESET PASSWORD FORM -->
        <form id="resetForm" method="post" action="{% url 'reset_password' %}" novalidate>
            {% csrf_token %}
            <input type="hidden" name="username" value="{{ username }}">
            
            <!-- NEW PASSWORD ROW -->
            <div class="form-row">
                <label for="password">New Password</label>
                <div class="input-wrapper">
                    <input type="password" id="password" name="password" placeholder="Enter new password" autocomplete="new-password" required>
                </div>
                <div id="passwordError" class="error-message" style="display: none;"></div>
            </div>

            <!-- CONFIRM PASSWORD ROW -->
            <div class="form-row">
                <label for="confirmPassword">Confirm Password</label>
                <div class="input-wrapper">
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm new password" autocomplete="new-password" required>
                </div>
                <div id="confirmError" class="error-message" style="display: none;"></div>
            </div>

            <!-- RESET BUTTON -->
            <button type="submit" class="reset-btn">
                <span>Reset Password</span>
            </button>

            <div class="signin-route">
                <a href="{% url 'login' %}">Back to Sign in</a>
            </div>
        </form>
    </div>

    <script>
(function() {
    "use strict";

    const form = document.getElementById('resetForm');
    const password = document.getElementById('password');
    const confirmPw = document.getElementById('confirmPassword');
    const passwordError = document.getElementById('passwordError');
    const confirmError = document.getElementById('confirmError');

    function setError(input, errorDiv, message) {
        input.classList.add('input-error');
        errorDiv.style.display = 'flex';
        errorDiv.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${message}`;
    }

    function clearError(input, errorDiv) {
        input.classList.remove('input-error');
        errorDiv.style.display = 'none';
    }

    function validateForm() {
        let isValid = true;

        clearError(password, passwordError);
        clearError(confirmPw, confirmError);

        // Password validation
        if (!password.value) {
            setError(password, passwordError, 'Password cannot be empty');
            isValid = false;
        } else if (password.value.length < 6) {
            setError(password, passwordError, 'Password must be at least 6 characters');
            isValid = false;
        }

        // Confirm password
        if (!confirmPw.value) {
            setError(confirmPw, confirmError, 'Please confirm your password');
            isValid = false;
        } else if (confirmPw.value !== password.value) {
            setError(confirmPw, confirmError, 'Passwords do not match');
            isValid = false;
        }

        return isValid;
    }

    password.addEventListener('input', function() {
        if (password.value.length >= 6) {
            clearError(password, passwordError);
        }
    });

    confirmPw.addEventListener('input', function() {
        if (confirmPw.value === password.value) {
            clearError(confirmPw, confirmError);
        }
    });

    form.addEventListener('submit', function(e) {
        e.preventDefault();

        if (validateForm()) {
            form.submit();
        }
    });

    // Auto-hide Django messages after 4.5 seconds
    const djangoMessages = document.querySelectorAll('.success-banner, .error-banner');
    if (djangoMessages.length > 0) {
        djangoMessages.forEach(function(messageDiv) {
            setTimeout(function() {
                messageDiv.style.transition = 'opacity 0.5s ease';
                messageDiv.style.opacity = '0';
                setTimeout(function() {
                    messageDiv.style.display = 'none';
                }, 500);
            }, 4500);
        });
    }
})();
</script>

</body>
</html>
