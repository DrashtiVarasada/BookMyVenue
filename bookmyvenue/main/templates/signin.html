{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookMyVenue · Sign in</title>
    <!-- Google Font & Font Awesome -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="{% static 'signin.css' %}">
</head>
<body>
    <div class="signin-card">
        <!-- consistent branding -->
        <div class="brand-row">
            <div class="logo-icon">
                <i class="fas fa-map-marker-alt"></i>
            </div>
            <div class="logo-text">BookMy<span>Venue</span></div>
        </div>

        <h1>Welcome back</h1>
        <!-- Django messages -->
        {% if messages %}
            {% for message in messages %}
                <div class="{% if message.tags == 'error' %}error-banner{% else %}success-banner{% endif %}" style="display: flex;">
                    <i class="fas {% if message.tags == 'error' %}fa-exclamation-circle{% else %}fa-check-circle{% endif %}"></i> {{ message }}
                </div>
            {% endfor %}
        {% endif %}
        <!-- dynamic alert for demo simulation -->
        <div id="liveAlert" style="display: none;"></div>

        <!-- SIGN IN FORM – ONE BY ONE ROWS: username row, password row (exactly as requested) -->
        <form id="signinForm" method="post" action="{% url 'login' %}" novalidate>
            {% csrf_token %}
            <!-- USERNAME ROW (full width) -->
            <div class="form-row">
                <label for="username">Username</label>
                <div class="input-wrapper">
                    <input type="text" id="username" name="username" placeholder="Enter username" autocomplete="username" value="{{ username|default:'' }}">
                </div>
                <div id="usernameError" class="error-message" style="display: none;"></div>
            </div>

            <!-- PASSWORD ROW (full width) -->
            <div class="form-row">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <input type="password" id="password" name="password" placeholder="Enter password" autocomplete="current-password">
                </div>
                <div id="passwordError" class="error-message" style="display: none;"></div>
            </div>

            <!-- Remember me & Forgot password row -->
            <div class="row-actions">
                <div class="forgot-link">
                    <a href="{% url 'forgot_password' %}">Forgot password?</a>
                </div>
            </div>

            <!-- SIGN IN BUTTON -->
            <button type="submit" class="signin-btn">
                <span>Sign in</span>
            </button>

            <div class="signup-route">
                Don't have an account? <a href="{% url 'signup' %}">Create account</a>
            </div>
        </form>
    </div>

    <script>
(function() {
    "use strict";

    const form = document.getElementById('signinForm');
    const username = document.getElementById('username');
    const password = document.getElementById('password');
    const usernameError = document.getElementById('usernameError');
    const passwordError = document.getElementById('passwordError');
    const liveAlert = document.getElementById('liveAlert');

    function setError(input, errorDiv, message) {
        input.classList.add('input-error');
        errorDiv.style.display = 'flex';
        errorDiv.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${message}`;
    }

    function clearError(input, errorDiv) {
        input.classList.remove('input-error');
        errorDiv.style.display = 'none';
    }

    function isValidUsername(val) {
        return val.trim().length >= 2;
    }

    function validateSignIn() {
        let isValid = true;

        clearError(username, usernameError);
        clearError(password, passwordError);

        if (!username.value.trim()) {
            setError(username, usernameError, 'Username is required');
            isValid = false;
        } else if (!isValidUsername(username.value)) {
            setError(username, usernameError, 'Username must be at least 2 characters');
            isValid = false;
        }

        if (!password.value) {
            setError(password, passwordError, 'Password cannot be empty');
            isValid = false;
        }

        return isValid;
    }

    function showSuccessMessage() {
        liveAlert.style.display = 'flex';
        liveAlert.className = 'success-banner';
        liveAlert.innerHTML = '<i class="fas fa-check-circle"></i> Welcome back! Youve successfully signed in.';
        setTimeout(() => {
            liveAlert.style.display = 'none';
        }, 4500);
    }

    username.addEventListener('input', function() {
        if (username.value.trim().length >= 2) {
            clearError(username, usernameError);
        }
    });

    password.addEventListener('input', function() {
        if (password.value.trim().length > 0) {
            clearError(password, passwordError);
        }
    });

    form.addEventListener('submit', function(e) {
        e.preventDefault();

        if (validateSignIn()) {
            // Submit the form to Django backend
            form.submit();
        }
    });

    form.setAttribute('novalidate', 'novalidate');

    // Auto-hide Django messages after 4.5 seconds
    const djangoMessages = document.querySelectorAll('.success-banner, .error-banner');
    if (djangoMessages.length > 0) {
        djangoMessages.forEach(function(messageDiv) {
            setTimeout(function() {
                messageDiv.style.transition = 'opacity 0.5s ease';
                messageDiv.style.opacity = '0';
                setTimeout(function() {
                    messageDiv.style.display = 'none';
                }, 500);
            }, 4500);
        });
    }
})();
</script>


</body>
</html>
