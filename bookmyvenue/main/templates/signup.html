{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookMyVenue · Sign up</title>
    <!-- Google Font & Font Awesome for icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="{% static 'signup.css' %}">
</head>
<body>
    <div class="signup-card">

        <!-- header with logo / brand -->
        <div class="logo-area">
            <div class="logo-icon">
                <i class="fas fa-map-marker-alt"></i>
            </div>
            <div class="logo-text">BookMy<span>Venue</span></div>
        </div>

        <h2>Create account</h2>

        <!-- Django messages -->
        {% if messages %}
            {% for message in messages %}
                <div class="{% if message.tags == 'error' %}error-message{% else %}success-message{% endif %}" style="display: flex;">
                    <i class="fas {% if message.tags == 'error' %}fa-exclamation-circle{% else %}fa-check-circle{% endif %}"></i> {{ message }}
                </div>
            {% endfor %}
        {% endif %}
        <!-- dynamic success / error notification (hidden by default) -->
        <div id="liveAlert" style="display: none;"></div>

        <!-- SIGNUP FORM – rows exactly as in description: Role, Username, Email, Password, Confirm Password -->
        <form id="signupForm" method="post" action="{% url 'signup' %}" novalidate>
            {% csrf_token %}
            <!-- Role row with two options: Venue Owner & User (inside select) -->
            <div class="form-row" id="row-role">
                <label for="roleSelect"> Role</label>
                <div class="input-wrapper">
                    <select id="roleSelect" name="roleSelect" class="role-select" required>
                        <option value="" disabled {% if not selected_role %}selected{% endif %}>Select Role</option>
                        <option value="venue_owner" {% if selected_role == 'venue_owner' %}selected{% endif %}>Venue Owner</option>
                        <option value="user" {% if selected_role == 'user' %}selected{% endif %}>User</option>
                    </select>
                </div>
            </div>

            <!-- Username row -->
            <div class="form-row" id="row-username">
                <label for="username"> Username</label>
                <div class="input-wrapper">
                    <input type="text" id="username" name="username" placeholder="Enter username" autocomplete="off" value="{{ username|default:'' }}" required>
                </div>
                <div id="usernameError" class="error-msg" style="display: none;"></div>
            </div>

            <!-- Email row -->
            <div class="form-row" id="row-email">
                <label for="email"> Email</label>
                <div class="input-wrapper">
                    <input type="email" id="email" name="email" placeholder="Enter email" autocomplete="off" value="{{ email|default:'' }}" required>
                </div>
                <div id="emailError" class="error-msg" style="display: none;"></div>
            </div>

            <!-- Password row + strength meter -->
            <div class="form-row" id="row-password">
                <label for="password"> Password</label>
                <div class="input-wrapper">
                    <input type="password" id="password" name="password" placeholder="Enter password" autocomplete="off" value="{{ password|default:'' }}" required>
                </div>
                <div id="passwordError" class="error-msg" style="display: none;"></div>
            </div>

            <!-- Confirm Password row -->
            <div class="form-row" id="row-confirm">
                <label for="confirmPassword">Confirm Password</label>
                <div class="input-wrapper">
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm password" autocomplete="off" value="{{ confirmPassword|default:'' }}" required>
                </div>
                <div id="confirmError" class="error-msg" style="display: none;"></div>
            </div>

            <!-- Register button (matches mockup) -->
            <button type="submit" class="register-btn">
                <span>Register</span>
            </button>
        </form>

        <!-- extra sign in redirect -->
        <div class="login-route">
            Already a member? <a href="{% url 'login' %}">Sign in</a>
        </div>
    </div>

    <script>
(function() {
    "use strict";

    const form = document.getElementById('signupForm');
    const roleSelect = document.getElementById('roleSelect');
    const username = document.getElementById('username');
    const email = document.getElementById('email');
    const password = document.getElementById('password');
    const confirmPw = document.getElementById('confirmPassword');

    const usernameErr = document.getElementById('usernameError');
    const emailErr = document.getElementById('emailError');
    const passwordErr = document.getElementById('passwordError');
    const confirmErr = document.getElementById('confirmError');

    const liveAlert = document.getElementById('liveAlert');

    function setError(element, errorDiv, message) {
        element.classList.add('input-error');
        errorDiv.style.display = 'flex';
        errorDiv.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${message}`;
    }

    function clearError(element, errorDiv) {
        element.classList.remove('input-error');
        errorDiv.style.display = 'none';
    }

    function resetErrors() {
        clearError(username, usernameErr);
        clearError(email, emailErr);
        clearError(password, passwordErr);
        clearError(confirmPw, confirmErr);
        roleSelect.classList.remove('input-error');
    }

    function isValidEmail(emailStr) {
        const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        return re.test(emailStr);
    }

    function validateForm() {
        let isValid = true;
        resetErrors();

        // Role
        if (!roleSelect.value) {
            roleSelect.classList.add('input-error');
            let roleRow = document.getElementById('row-role');
            let existErr = roleRow.querySelector('.error-msg');

            if (!existErr) {
                let errDiv = document.createElement('div');
                errDiv.className = 'error-msg';
                errDiv.style.display = 'flex';
                errDiv.innerHTML = '<i class="fas fa-exclamation-circle"></i> Please select a role';
                roleRow.appendChild(errDiv);
            } else {
                existErr.style.display = 'flex';
                existErr.innerHTML = '<i class="fas fa-exclamation-circle"></i> Please select a role';
            }
            isValid = false;
        }

        // Username
        if (!username.value.trim()) {
            setError(username, usernameErr, 'Username is required');
            isValid = false;
        } else if (username.value.trim().length < 3) {
            setError(username, usernameErr, 'Username must be at least 3 characters');
            isValid = false;
        }

        // Email
        if (!email.value.trim()) {
            setError(email, emailErr, 'Email address is required');
            isValid = false;
        } else if (!isValidEmail(email.value.trim())) {
            setError(email, emailErr, 'Enter a valid email');
            isValid = false;
        }

        // Password
        if (!password.value) {
            setError(password, passwordErr, 'Password cannot be empty');
            isValid = false;
        } else if (password.value.length < 6) {
            setError(password, passwordErr, 'Password must be at least 6 characters');
            isValid = false;
        }

        // Confirm password
        if (!confirmPw.value) {
            setError(confirmPw, confirmErr, 'Please confirm your password');
            isValid = false;
        } else if (confirmPw.value !== password.value) {
            setError(confirmPw, confirmErr, 'Passwords do not match');
            isValid = false;
        }

        return isValid;
    }

    function showSuccess() {
        liveAlert.style.display = 'flex';
        liveAlert.className = 'success-message';
        liveAlert.innerHTML = '<i class="fas fa-check-circle"></i> Welcome! Your account has been created.';
        setTimeout(() => {
            liveAlert.style.display = 'none';
        }, 4500);
    }

    // Event listeners
    username.addEventListener('input', function() {
        if (username.value.trim().length >= 3)
            clearError(username, usernameErr);
    });

    email.addEventListener('input', function() {
        if (isValidEmail(email.value.trim()))
            clearError(email, emailErr);
    });

    confirmPw.addEventListener('input', function() {
        if (confirmPw.value === password.value)
            clearError(confirmPw, confirmErr);
    });

    roleSelect.addEventListener('change', function() {
        roleSelect.classList.remove('input-error');
        let roleRow = document.getElementById('row-role');
        let existErr = roleRow.querySelector('.error-msg');
        if (existErr) existErr.style.display = 'none';
    });

    form.addEventListener('submit', function(e) {
        e.preventDefault();
        if (validateForm()) {
            // Submit the form to Django backend
            form.submit();
        }
    });

})();
</script>

</body>
</html>
